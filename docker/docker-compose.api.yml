services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: vieneu-tts-api
    restart: unless-stopped
    ports:
      - "${TTS_PORT:-8000}:8000"
    volumes:
      # Bind mount storage so data persists on host (accessible outside container)
      - ./storage:/app/storage
      # Bind mount local models for offline deployment (optional)
      - ./models:/app/models
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - path: ../.env
        required: false
    environment:
      - TTS_USERNAME=${TTS_USERNAME:-admin}
      - TTS_PASSWORD=${TTS_PASSWORD:-admin}
      - TTS_HOST=0.0.0.0
      - TTS_PORT=8000
      - TTS_CACHE_DIR=/app/storage/audio_cache
      - TTS_DB_PATH=/app/storage/tts_cache.db
      - TTS_CLEANUP_DAYS=${TTS_CLEANUP_DAYS:-30}
      - TTS_RATE_LIMIT=${TTS_RATE_LIMIT:-30/minute}
      # Use local models path for offline deployment (set in .env)
      - TTS_BACKBONE_REPO=${TTS_BACKBONE_REPO:-}
      - TTS_DEFAULT_VOICE=${TTS_DEFAULT_VOICE:-}
      - TTS_TEMPERATURE=${TTS_TEMPERATURE:-0.4}
      - TTS_MAX_CHARS_PER_CHUNK=${TTS_MAX_CHARS_PER_CHUNK:-256}
      - HF_HOME=/root/.cache/huggingface
      - PYTHONUNBUFFERED=1

  # Gradio web UI — for comparison testing alongside the API
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
      target: prod
    container_name: vieneu-tts-web
    restart: unless-stopped
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - GRADIO_SHARE=0
      - HF_HOME=/root/.cache/huggingface
      - PYTHONUNBUFFERED=1
    profiles:
      - web

volumes:
  huggingface_cache:
